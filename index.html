<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seolx | Web Sunucusu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #000000);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            color: white; padding: 20px; overflow: hidden;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* Sidebar Ortak Stil */
        .sidebar {
            position: fixed; top: 0; width: 300px; height: 100%;
            background: rgba(10, 10, 30, 0.9); backdrop-filter: blur(20px);
            z-index: 1000; transition: 0.5s cubic-bezier(0.77,0.2,0.05,1.0);
            padding: 40px 20px; border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; flex-direction: column; gap: 15px; overflow-y: auto;
        }

        .sidebar-left { left: -310px; }
        .sidebar-left.active { left: 0; }
        .sidebar-right { right: -310px; }
        .sidebar-right.active { right: 0; }

        /* Menü Butonları */
        .menu-btn {
            position: fixed; top: 25px; z-index: 1001; cursor: pointer;
            background: rgba(255, 255, 255, 0.1); padding: 12px; border-radius: 12px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s; font-size: 1.2rem;
        }
        .menu-btn:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.1); }
        .btn-left { left: 25px; }
        .btn-right { right: 25px; }

        .section-box { padding: 15px; background: rgba(255, 255, 255, 0.05); border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .section-title { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; color: #00ff88; margin-bottom: 10px; display: block; letter-spacing: 1px; }
        
        .social-link {
            text-decoration: none; color: white; background: rgba(255, 255, 255, 0.08);
            padding: 12px; border-radius: 10px; font-size: 0.8rem; display: flex;
            align-items: center; justify-content: center; gap: 10px; transition: 0.3s;
            margin-bottom: 8px; border: none; width: 100%; cursor: pointer;
        }
        .social-link:hover { background: rgba(0, 255, 136, 0.2); transform: translateX(5px); }

        .glass-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px;
            padding: 50px 30px; text-align: center; width: 90%; max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        #clock { font-size: 4rem; font-weight: 600; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        #weather { font-size: 0.85rem; line-height: 1.5; color: #00d2ff; }
        .footer-text { font-size: 0.6rem; opacity: 0.3; text-align: center; margin-top: auto; padding-top: 20px; }
    </style>
</head>
<body>

    <div class="menu-btn btn-left" onclick="toggleSidebar('sidebar-left')">⚙️</div>
    <div class="menu-btn btn-right" onclick="toggleSidebar('sidebar-right')">🔗</div>

    <div class="sidebar sidebar-left" id="sidebar-left">
        <h2 style="font-size: 1rem; margin-bottom: 10px; color: #00ff88; letter-spacing: 2px;">PANEL</h2>
        
        <div class="section-box">
            <span class="section-title">🎧 Wegh - Playlist</span>
            <iframe 
                style="border-radius:12px" 
                src="https://www.youtube.com/embed/videoseries?list=PLtDUHIXNDtvvorvm_fRg1GRng7B7O2Njs" 
                width="100%" 
                height="160" 
                frameborder="0" 
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                loading="lazy">
            </iframe>
        </div>

        <div class="section-box">
            <span class="section-title">☁️ Hava Durumu</span>
            <div id="weather">📍 Bursa: 18°C <br> ☁️ Parçalı Bulutlu</div>
        </div>

        <div class="section-box">
            <span class="section-title">⏱️ Kronometre</span>
            <div id="chronoDisplay" style="text-align: center; font-size: 1.2rem; margin-bottom: 10px; font-weight: 600;">00:00:00</div>
            <div style="display: flex; gap: 5px;">
                <button onclick="startChrono()" class="social-link" style="font-size: 0.7rem; background: rgba(0,255,136,0.1);">Başlat</button>
                <button onclick="stopChrono()" class="social-link" style="font-size: 0.7rem;">Durdur</button>
            </div>
        </div>

        <div class="section-box">
            <span class="section-title">📩 Mesaj Kutusu</span>
            <form action="https://formspree.io/f/xzdjeyrd" method="POST">
                <input type="text" name="name" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:white; padding:8px; margin-bottom:5px; font-size:0.75rem;" placeholder="İsim" required>
                <textarea name="message" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:white; padding:8px; height:50px; font-size:0.75rem; resize:none;" placeholder="Mesajın..." required></textarea>
                <button type="submit" class="social-link" style="background: rgba(0,255,136,0.1); font-size:0.75rem;">Gönder</button>
            </form>
        </div>
    </div>

    <div class="sidebar sidebar-right" id="sidebar-right">
        <h2 style="font-size: 1rem; margin-bottom: 10px; color: #00ff88; text-align: right; letter-spacing: 2px;">SOSYAL</h2>
        <a href="https://www.tiktok.com/@farazi1881" target="_blank" class="social-link">🎵 TikTok</a>
        <a href="https://x.com/Hmayan20" target="_blank" class="social-link">🐦 X (Twitter)</a>
        <a href="https://discord.gg/CmM9fdWc" target="_blank" class="social-link">💬 Discord</a>
        <a href="https://instagram.com/hamza.gsafs" target="_blank" class="social-link">📸 Instagram</a>
        
        <div class="footer-text">© 2026 Seolx Sunucusu <br> Gürsu, Bursa</div>
    </div>

    <div class="glass-card">
        <div id="greeting" style="letter-spacing: 5px; opacity: 0.7; font-size: 0.8rem; text-transform: uppercase;">Sistem Hazırlanıyor...</div>
        <div id="clock">00:00:00</div>
        <div id="date" style="opacity: 0.5; font-size: 0.85rem; font-weight: 300;">...</div>
    </div>

    <script>
        // Sidebar Aç/Kapat
        function toggleSidebar(id) {
            document.getElementById(id).classList.toggle('active');
        }

        // Saat ve Selamlama
        function updateClock() {
            const now = new Date();
            let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            h = h < 10 ? "0" + h : h; m = m < 10 ? "0" + m : m; s = s < 10 ? "0" + s : s;
            document.getElementById("clock").innerText = h + ":" + m + ":" + s;
            document.getElementById("date").innerText = now.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' });
            
            let greeting = "İYİ GECELER";
            if (h >= 5 && h < 12) greeting = "GÜNAYDIN";
            else if (h >= 12 && h < 18) greeting = "TÜNAYDIN";
            else if (h >= 18 && h < 23) greeting = "İYİ AKŞAMLAR";
            document.getElementById("greeting").innerText = greeting;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Kronometre Sistemi
        let chronoInterval, seconds = 0;
        function startChrono() { 
            clearInterval(chronoInterval); 
            chronoInterval = setInterval(() => { 
                seconds++;
                let h = Math.floor(seconds/3600), m = Math.floor((seconds%3600)/60), s = seconds%60;
                document.getElementById("chronoDisplay").innerText = (h<10?"0"+h:h)+":"+(m<10?"0"+m:m)+":"+(s<10?"0"+s:s);
            }, 1000); 
        }
        function stopChrono() { clearInterval(chronoInterval); }
    </script>
</body>
</html>
