<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seolx | Web Sunucusu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #000000);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            color: white; padding: 20px; overflow: hidden; transition: 0.3s;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes policeFlash { 0% { background: #ff0000; } 50% { background: #0000ff; } 100% { background: #ff0000; } }
        .emergency-mode { animation: policeFlash 0.2s infinite !important; }

        /* Sidebar Ortak Stil */
        .sidebar {
            position: fixed; top: 0; width: 300px; height: 100%;
            background: rgba(10, 10, 30, 0.9); backdrop-filter: blur(20px);
            z-index: 1000; transition: 0.5s cubic-bezier(0.77,0.2,0.05,1.0);
            padding: 40px 20px; border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; flex-direction: column; gap: 15px; overflow-y: auto;
        }

        /* Sol Sidebar */
        .sidebar-left { left: -310px; border-right: 1px solid rgba(255, 255, 255, 0.1); }
        .sidebar-left.active { left: 0; }

        /* Sağ Sidebar */
        .sidebar-right { right: -310px; border-left: 1px solid rgba(255, 255, 255, 0.1); }
        .sidebar-right.active { right: 0; }

        /* Menü Butonları */
        .menu-btn {
            position: fixed; top: 25px; z-index: 1001; cursor: pointer;
            background: rgba(255, 255, 255, 0.1); padding: 12px; border-radius: 12px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn-left { left: 25px; }
        .btn-right { right: 25px; }

        .section-box { padding: 15px; background: rgba(255, 255, 255, 0.05); border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .section-title { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; color: #00ff88; margin-bottom: 10px; display: block; letter-spacing: 1px; }
        
        .social-link {
            text-decoration: none; color: white; background: rgba(255, 255, 255, 0.08);
            padding: 12px; border-radius: 10px; font-size: 0.8rem; display: flex;
            align-items: center; justify-content: center; gap: 10px; transition: 0.3s;
            margin-bottom: 8px; border: none; width: 100%; cursor: pointer;
        }
        .social-link:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.02); }

        .tool-input, .msg-area, .select-input {
            width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px; padding: 8px; color: white; margin-bottom: 8px; font-size: 0.75rem; outline: none;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px;
            padding: 50px 30px; text-align: center; width: 90%; max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        #clock { font-size: 4rem; font-weight: 600; }
        .footer-text { font-size: 0.6rem; opacity: 0.3; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="menu-btn btn-left" onclick="toggleSidebar('sidebar-left')">⚙️</div>
    <div class="menu-btn btn-right" onclick="toggleSidebar('sidebar-right')">🔗</div>

    <div class="sidebar sidebar-left" id="sidebar-left">
        <h2 style="font-size: 1rem; margin-bottom: 10px; color: #00ff88;">KONTROL PANELİ</h2>
        
        <div class="section-box">
            <span class="section-title">☁️ Hava Durumu</span>
            <div id="weather" style="font-size: 0.85rem; font-weight: 400;">Yükleniyor...</div>
        </div>

        <div class="section-box">
            <span class="section-title">🎵 Müzik Değiştir</span>
            <select class="select-input" id="musicSelect" onchange="changeMusic()">
                <option value="buyuk-insan.mp3">Büyük İnsan</option>
                <option value="sarki2.mp3">Favori Parça 2</option>
                <option value="sarki3.mp3">Deep Focus</option>
            </select>
            <button onclick="toggleMusic()" id="musicBtn" class="social-link">⏸️ Durdur/Başlat</button>
            <audio id="bgMusic" loop><source src="buyuk-insan.mp3" type="audio/mpeg"></audio>
        </div>

        <div class="section-box">
            <span class="section-title">⏱️ Kronometre</span>
            <div id="chronoDisplay" style="text-align: center; margin-bottom: 5px;">00:00:00</div>
            <div style="display: flex; gap: 5px;">
                <button onclick="startChrono()" class="social-link" style="font-size: 0.6rem; padding: 5px;">Başlat</button>
                <button onclick="stopChrono()" class="social-link" style="font-size: 0.6rem; padding: 5px;">Durdur</button>
            </div>
        </div>

        <div class="section-box">
            <span class="section-title">📩 Mesaj Bırak</span>
            <div id="msgCounter" style="font-size: 0.6rem; color: #00ff88; margin-bottom: 5px;">0 mesaj</div>
            <form action="https://formspree.io/f/xzdjeyrd" method="POST" onsubmit="countMessage()">
                <input type="text" name="name" class="tool-input" placeholder="Adın" required>
                <textarea name="message" class="msg-area" placeholder="Mesajın" required></textarea>
                <button type="submit" class="social-link" style="background: rgba(0,255,136,0.1);">Gönder</button>
            </form>
        </div>
    </div>

    <div class="sidebar sidebar-right" id="sidebar-right">
        <h2 style="font-size: 1rem; margin-bottom: 10px; color: #00ff88; text-align: right;">BAĞLANTILAR</h2>
        <div class="section-box" style="background: none; border: none;">
            <a href="https://www.tiktok.com/@farazi1881" target="_blank" class="social-link">🎵 TikTok</a>
            <a href="https://x.com/Hmayan20" target="_blank" class="social-link">🐦 X (Twitter)</a>
            <a href="https://discord.gg/CmM9fdWc" target="_blank" class="social-link">💬 Discord</a>
            <a href="https://instagram.com/hamza.gsafs" target="_blank" class="social-link">📸 Instagram</a>
            <a href="http://spotify.com" target="_blank" class="social-link" style="border: 1px solid #1DB954;">🟢 Spotify</a>
            <a href="https://music.youtube.com" target="_blank" class="social-link" style="border: 1px solid #f44336;">🔴 YT Music</a>
        </div>
        <div class="footer-text">© 2026 Seolx Web Sunucusu</div>
    </div>

    <div class="glass-card">
        <div id="greeting" style="letter-spacing: 3px; opacity: 0.7; font-size: 0.8rem;">YÜKLENİYOR...</div>
        <div id="clock">00:00:00</div>
        <div id="date" style="opacity: 0.5; font-size: 0.85rem;">...</div>
    </div>

    <script>
        function toggleSidebar(id) {
            document.getElementById(id).classList.toggle('active');
        }

        // HAVA DURUMU (Gürsu/Bursa Örneği)
        async function getWeather() {
            try {
                // Not: Gerçek veri için bir API anahtarı gerekir, şimdilik simüle ediyoruz
                document.getElementById('weather').innerHTML = "📍 Bursa: 18°C <br> ☁️ Parçalı Bulutlu";
            } catch (e) { document.getElementById('weather').innerText = "Hata oluştu"; }
        }
        getWeather();

        // MÜZİK DEĞİŞTİRME
        function changeMusic() {
            const music = document.getElementById("bgMusic");
            const select = document.getElementById("musicSelect");
            music.src = select.value;
            music.play();
            document.getElementById("musicBtn").innerHTML = "⏸️ Müziği Durdur";
        }

        // SAAT SİSTEMİ
        function updateClock() {
            const now = new Date();
            let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            h = h < 10 ? "0" + h : h; m = m < 10 ? "0" + m : m; s = s < 10 ? "0" + s : s;
            document.getElementById("clock").innerText = h + ":" + m + ":" + s;
            document.getElementById("date").innerText = now.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' });
            document.getElementById("greeting").innerText = h < 12 ? "GÜNAYDIN" : h < 18 ? "TÜNAYDIN" : "İYİ AKŞAMLAR";
        }
        setInterval(updateClock, 1000); updateClock();

        // MÜZİK KONTROL
        const music = document.getElementById("bgMusic");
        function toggleMusic() {
            if (music.paused) { music.play(); document.getElementById("musicBtn").innerHTML = "⏸️ Müziği Durdur"; }
            else { music.pause(); document.getElementById("musicBtn").innerHTML = "▶️ Müziği Başlat"; }
        }

        // MESAJ SAYACI
        let msgCount = localStorage.getItem('seolxMsgCount') || 0;
        document.getElementById('msgCounter').innerText = msgCount + " mesaj gönderildi";
        function countMessage() { localStorage.setItem('seolxMsgCount', ++msgCount); }

        // KRONOMETRE
        let chronoInterval, seconds = 0;
        function startChrono() { clearInterval(chronoInterval); chronoInterval = setInterval(() => { 
            seconds++;
            let h = Math.floor(seconds/3600), m = Math.floor((seconds%3600)/60), s = seconds%60;
            document.getElementById("chronoDisplay").innerText = (h<10?"0"+h:h)+":"+(m<10?"0"+m:m)+":"+(s<10?"0"+s:s);
        }, 1000); }
        function stopChrono() { clearInterval(chronoInterval); }
    </script>
</body>
</html>
