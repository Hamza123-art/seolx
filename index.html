<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seolx | Yakında...</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #000; /* Mutlak Siyah */
            color: white; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
            font-family: 'Poppins', sans-serif; 
        }

        /* EKRANI DAHA DA KARARTAN GÖLGE KATMANI */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            /* Kenarlardan merkeze doğru derin karanlık */
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,1) 90%);
            pointer-events: none;
            z-index: 1;
        }

        .container { 
            text-align: center; 
            width: 90%; 
            max-width: 1200px;
            position: relative;
            z-index: 2; /* Karanlık katmanının üstünde kalması için */
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.5rem, 8vw, 7rem);
            letter-spacing: clamp(5px, 2vw, 15px);
            /* Hafif beyaz parlama siyahı daha derin gösterir */
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
            margin-bottom: 10px;
            line-height: 1.1;
        }

        p {
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            letter-spacing: clamp(2px, 1vw, 6px);
            opacity: 0.3; /* Daha da silikleşti, karanlığa gömüldü */
            text-transform: uppercase;
            margin-bottom: clamp(20px, 5vh, 40px);
        }

        #countdown {
            font-size: clamp(2.5rem, 10vw, 6rem);
            font-weight: 700;
            color: #00ff88;
            /* Neon yeşili karanlıkta parlıyor */
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.2), 0 0 60px rgba(0, 255, 136, 0.1);
            font-variant-numeric: tabular-nums;
        }

        /* Başlatma Ekranı */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999;
            display: flex; justify-content: center; align-items: center;
        }
        
        .start-btn {
            background: transparent; color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.2); 
            padding: 12px 35px; 
            font-size: 0.9rem; 
            letter-spacing: 2px;
            border-radius: 2px; cursor: pointer; transition: 0.5s;
        }
        .start-btn:hover { color: #fff; border-color: #fff; box-shadow: 0 0 20px rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="overlay">
        <button class="start-btn" onclick="startSystem()">İçeri Gir</button>
    </div>

    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <h1>SEOLX SANALIN ASIL SAHİBİDİR!!!</h1>
        <p>Yakında...</p>
        <div id="countdown">00:00:00</div>
    </div>

    <script>
        function startSystem() {
            const music = document.getElementById('bg-music');
            music.play();
            document.getElementById('overlay').style.display = 'none';
        }

        const targetDate = new Date("March 18, 2026 20:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById("countdown").innerHTML = "00:00:00";
                return;
            }

            const totalHours = Math.floor(distance / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            const hDisplay = totalHours < 10 ? "0" + totalHours : totalHours;
            const mDisplay = minutes < 10 ? "0" + minutes : minutes;
            const sDisplay = seconds < 10 ? "0" + seconds : seconds;

            document.getElementById("countdown").innerHTML = hDisplay + ":" + mDisplay + ":" + sDisplay;
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
