<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seolx | DEVELOPER</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #000000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            padding: 20px;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- MENÜ TUŞU (Sol Üst) --- */
        .menu-btn {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 1000;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
        }

        .menu-btn:hover { background: rgba(255, 255, 255, 0.2); }

        .menu-btn div {
            width: 25px;
            height: 3px;
            background-color: white;
            margin: 5px 0;
            transition: 0.4s;
            border-radius: 2px;
        }

        /* --- YAN PANEL (Sidebar) --- */
        .sidebar {
            position: fixed;
            top: 0;
            left: -350px; /* Başlangıçta gizli */
            width: 320px;
            height: 100%;
            background: rgba(15, 12, 41, 0.8);
            backdrop-filter: blur(25px);
            z-index: 999;
            transition: 0.5s cubic-bezier(0.77,0.2,0.05,1.0);
            padding: 80px 30px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar.active { left: 0; }

        /* --- ANA SAAT KARTI --- */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            transition: 0.5s;
        }

        #greeting { font-size: 1rem; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 10px; opacity: 0.7; }
        #clock { font-size: 4.5rem; font-weight: 600; margin-bottom: 10px; color: #fff; text-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        #date { font-size: 1rem; opacity: 0.5; }

        /* --- PANEL İÇERİĞİ --- */
        .about-section {
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            margin-bottom: 10px;
        }

        .about-title { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; color: #aaa; margin-bottom: 10px; display: block; }
        .about-text { font-size: 0.95rem; line-height: 1.6; opacity: 0.9; }

        .social-container { display: flex; flex-direction: column; gap: 12px; }
        .social-link {
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 15px;
            font-size: 0.95rem;
            transition: 0.3s;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .social-link:hover { background: rgba(255, 255, 255, 0.2); transform: translateX(10px); }

        .footer { position: absolute; bottom: 30px; font-size: 0.7rem; opacity: 0.4; left: 30px; }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="about-section">
            <span class="about-title">Hakkımda</span>
            <p class="about-text">Sanalın İçinden Geçmek İçin Doğdum.</p>
        </div>

        <div class="social-container">
            <a href="https://www.tiktok.com/@farazi1881" target="_blank" class="social-link">🎵 TikTok</a>
            <a href="https://x.com/Hmayan20" target="_blank" class="social-link">🐦 X (Twitter)</a>
            <a href="https://discord.gg/CmM9fdWc" target="_blank" class="social-link">💬 Discord</a>
            <a href="https://instagram.com/hamza.gsafs" target="_blank" class="social-link">📸 Instagram</a>
        </div>
        
        <div class="footer">SEOLX.VERCEL.APP • 2026</div>
    </div>

    <div class="glass-card">
        <div id="greeting">Yükleniyor...</div>
        <div id="clock">00:00:00</div>
        <div id="date">Yükleniyor...</div>
    </div>

    <script>
        // Menü Aç/Kapat Fonksiyonu
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        // Saat Fonksiyonu
        function updateClock() {
            const now = new Date();
            let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            h = h < 10 ? "0" + h : h; m = m < 10 ? "0" + m : m; s = s < 10 ? "0" + s : s;
            document.getElementById("clock").innerText = h + ":" + m + ":" + s;

            let greeting = "";
            if (h >= 5 && h < 12) greeting = "Günaydın Kullanıcı";
            else if (h >= 12 && h < 18) greeting = "Tünaydın Kullanıcı";
            else if (h >= 18 && h < 22) greeting = "İyi Akşamlar Kullanıcı";
            else greeting = "İyi Geceler Kullanıcı";
            document.getElementById("greeting").innerText = greeting;

            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById("date").innerText = now.toLocaleDateString('tr-TR', options);
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
