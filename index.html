<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seolx | Kişisel Portfolyo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #000000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
        }

        #greeting { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 5px; opacity: 0.7; }
        #clock { font-size: 3.5rem; font-weight: 600; margin-bottom: 5px; color: #fff; }
        #date { font-size: 0.85rem; opacity: 0.5; margin-bottom: 25px; }

        /* Hakkında Bölümü */
        .about-section {
            margin-bottom: 25px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px dashed rgba(255, 255, 255, 0.2);
        }

        .about-title {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: #aaa;
            display: block;
        }

        .about-text {
            font-size: 0.9rem;
            line-height: 1.6;
            opacity: 0.9;
            font-weight: 300;
        }

        .social-container { display: flex; flex-direction: column; gap: 10px; }

        .social-link {
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.08);
            padding: 12px;
            border-radius: 15px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .social-link:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .footer { position: absolute; bottom: 15px; font-size: 0.65rem; opacity: 0.3; }
    </style>
</head>
<body>

    <div class="glass-card">
        <div id="greeting">Yükleniyor...</div>
        <div id="clock">00:00:00</div>
        <div id="date">Yükleniyor...</div>

        <div class="about-section">
            <span class="about-title">Hakkımda</span>
            <p class="about-text">
                Dijital dünyada iz bırakmayı seven bir geliştiriciyim. 
                Web teknolojileriyle deneyler yapıyor ve kendi evrenimi inşa ediyorum. 
                Sadelik ve hız benim için her şeydir.
            </p>
        </div>

        <div class="social-container">
            <a href="https://www.tiktok.com/@farazi1881" target="_blank" class="social-link">🎵 TikTok</a>
            <a href="https://x.com/Hmayan20" target="_blank" class="social-link">🐦 X (Twitter)</a>
            <a href="https://discord.gg/CmM9fdWc" target="_blank" class="social-link">💬 Discord</a>
            <a href="https://instagram.com/hamza.gsafs" target="_blank" class="social-link">📸 Instagram</a>
        </div>
    </div>

    <div class="footer">SEOLX.VERCEL.APP • 2026</div>

    <script>
        function updateClock() {
            const now = new Date();
            let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            h = h < 10 ? "0" + h : h; m = m < 10 ? "0" + m : m; s = s < 10 ? "0" + s : s;
            document.getElementById("clock").innerText = h + ":" + m + ":" + s;

            let greeting = "";
            if (h >= 5 && h < 12) greeting = "Günaydın Kullanıcı";
            else if (h >= 12 && h < 18) greeting = "Tünaydın Kullanıcı";
            else if (h >= 18 && h < 22) greeting = "İyi Akşamlar Kullanıcı";
            else greeting = "İyi Geceler Kullanıcı";
            document.getElementById("greeting").innerText = greeting;

            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById("date").innerText = now.toLocaleDateString('tr-TR', options);
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
