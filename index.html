<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seolx | Web Sunucusu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #000000);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            color: white; padding: 20px; overflow: hidden;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .sidebar {
            position: fixed; top: 0; width: 300px; height: 100%;
            background: rgba(10, 10, 30, 0.9); backdrop-filter: blur(20px);
            z-index: 1000; transition: 0.5s; padding: 40px 20px; border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; flex-direction: column; gap: 15px; overflow-y: auto;
        }
        .sidebar-left { left: -310px; } .sidebar-left.active { left: 0; }
        .sidebar-right { right: -310px; } .sidebar-right.active { right: 0; }

        .menu-btn {
            position: fixed; top: 25px; z-index: 1001; cursor: pointer;
            background: rgba(255, 255, 255, 0.1); padding: 12px; border-radius: 12px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn-left { left: 25px; } .btn-right { right: 25px; }

        .section-box { padding: 15px; background: rgba(255, 255, 255, 0.05); border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .section-title { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; color: #00ff88; margin-bottom: 10px; display: block; letter-spacing: 1px; }

        .music-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .control-btn { 
            background: rgba(255,255,255,0.1); border: none; color: white; 
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .control-btn:hover { background: rgba(0, 255, 136, 0.3); transform: scale(1.1); }
        .song-info { font-size: 0.75rem; text-align: center; margin-bottom: 5px; color: #00ff88; }
        
        .social-link {
            text-decoration: none; color: white; background: rgba(255, 255, 255, 0.08);
            padding: 12px; border-radius: 10px; font-size: 0.8rem; display: flex;
            align-items: center; justify-content: center; gap: 10px; transition: 0.3s;
            margin-bottom: 8px; width: 100%; cursor: pointer;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px;
            padding: 50px 30px; text-align: center; width: 90%; max-width: 450px;
        }
        #clock { font-size: 4rem; font-weight: 600; }
    </style>
</head>
<body>

    <div class="menu-btn btn-left" onclick="toggleSidebar('sidebar-left')">⚙️</div>
    <div class="menu-btn btn-right" onclick="toggleSidebar('sidebar-right')">🔗</div>

    <div class="sidebar sidebar-left" id="sidebar-left">
        <h2 style="font-size: 1rem; margin-bottom: 10px; color: #00ff88;">KONTROL PANELİ</h2>
        
        <div class="section-box">
            <span class="section-title">🎧 Medya Oynatıcı</span>
            <div class="song-info" id="currentSongTitle">Büyük İnsan - G. Türkmen</div>
            <div class="music-controls">
                <button class="control-btn" onclick="prevTrack()">⏮️</button>
                <button class="control-btn" onclick="toggleMusic()" id="playPauseBtn" style="width: 50px; height: 50px; font-size: 1.2rem;">▶️</button>
                <button class="control-btn" onclick="nextTrack()">⏭️</button>
            </div>
            <audio id="bgMusic" onended="nextTrack()">
                <source src="buyuk-insan.mp3" type="audio/mpeg">
            </audio>
        </div>

        <div class="section-box">
            <span class="section-title">☁️ Hava Durumu</span>
            <div id="weather" style="font-size: 0.85rem;">📍 Bursa: 18°C ☁️</div>
        </div>

        <div class="section-box">
            <span class="section-title">⏱️ Kronometre</span>
            <div id="chronoDisplay" style="text-align: center; font-size: 1.2rem;">00:00:00</div>
            <button onclick="startChrono()" class="social-link" style="margin-top:5px;">Başlat</button>
        </div>
    </div>

    <div class="sidebar sidebar-right" id="sidebar-right">
        <h2 style="font-size: 1rem; margin-bottom: 10px; color: #00ff88; text-align: right;">BAĞLANTILAR</h2>
        <a href="https://www.tiktok.com/@farazi1881" target="_blank" class="social-link">🎵 TikTok</a>
        <a href="https://x.com/Hmayan20" target="_blank" class="social-link">🐦 X (Twitter)</a>
        <a href="https://discord.gg/CmM9fdWc" target="_blank" class="social-link">💬 Discord</a>
        <a href="https://instagram.com/hamza.gsafs" target="_blank" class="social-link">📸 Instagram</a>
    </div>

    <div class="glass-card">
        <div id="greeting" style="letter-spacing: 3px; opacity: 0.7; font-size: 0.8rem;">YÜKLENİYOR...</div>
        <div id="clock">00:00:00</div>
        <div id="date" style="opacity: 0.5; font-size: 0.85rem;">...</div>
    </div>

    <script>
        const playlist = [
            { title: "Büyük İnsan - G. Türkmen", src: "buyuk-insan.mp3" },
            { title: "Favori Parça 2", src: "sarki2.mp3" }
        ];
        
        let currentTrackIndex = 0;
        const music = document.getElementById("bgMusic");
        const playPauseBtn = document.getElementById("playPauseBtn");
        const songTitle = document.getElementById("currentSongTitle");

        function loadTrack(index) {
            currentTrackIndex = index;
            music.src = playlist[currentTrackIndex].src;
            songTitle.innerText = playlist[currentTrackIndex].title;
        }

        function toggleMusic() {
            if (music.paused) {
                music.play();
                playPauseBtn.innerText = "⏸️";
            } else {
                music.pause();
                playPauseBtn.innerText = "▶️";
            }
        }

        function nextTrack() {
            currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
            loadTrack(currentTrackIndex);
            music.play();
            playPauseBtn.innerText = "⏸️";
        }

        function prevTrack() {
            currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
            loadTrack(currentTrackIndex);
            music.play();
            playPauseBtn.innerText = "⏸️";
        }

        function toggleSidebar(id) { document.getElementById(id).classList.toggle('active'); }

        function updateClock() {
            const now = new Date();
            let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            h = h < 10 ? "0" + h : h; m = m < 10 ? "0" + m : m; s = s < 10 ? "0" + s : s;
            document.getElementById("clock").innerText = h + ":" + m + ":" + s;
            document.getElementById("date").innerText = now.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' });
            document.getElementById("greeting").innerText = h < 12 ? "GÜNAYDIN" : h < 18 ? "TÜNAYDIN" : "İYİ AKŞAMLAR";
        }
        setInterval(updateClock, 1000); updateClock();

        let chronoInterval, seconds = 0;
        function startChrono() { 
            clearInterval(chronoInterval); 
            chronoInterval = setInterval(() => { 
                seconds++;
                let h = Math.floor(seconds/3600), m = Math.floor((seconds%3600)/60), s = seconds%60;
                document.getElementById("chronoDisplay").innerText = (h<10?"0"+h:h)+":"+(m<10?"0"+m:m)+":"+(s<10?"0"+s:s);
            }, 1000); 
        }

        loadTrack(0);
    </script>
</body>
</html>
