<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="google-site-verification" content="OcD6oP-dNgAYSKV195-8s7gWdz8xsKynrvv1X37tJmI" />

    <title>Seolx | Web Sunucusu ve Dijital Portfolyo</title>
    <meta name="description" content="Seolx Web Sunucusu - En güncel projeler, sosyal medya bağlantıları ve dijital asistan hizmetleri.">
    <meta name="keywords" content="seolx, seolx web sunucusu, seolx web, hamza seolx, dijital portfolyo">
    <meta name="author" content="Seolx">
    <link rel="canonical" href="https://seolx.vercel.app/">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #000000);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            color: white; padding: 20px; overflow: hidden;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .menu-btn {
            position: fixed; top: 25px; left: 25px; z-index: 1001; cursor: pointer;
            background: rgba(255, 255, 255, 0.1); padding: 12px; border-radius: 12px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
        }

        .sidebar {
            position: fixed; top: 0; left: -350px; width: 320px; height: 100%;
            background: rgba(10, 10, 30, 0.95); backdrop-filter: blur(25px);
            z-index: 1000; transition: 0.5s cubic-bezier(0.77,0.2,0.05,1.0);
            padding: 80px 20px 40px 20px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; flex-direction: column; gap: 20px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.2) transparent;
        }

        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        .sidebar.active { left: 0; }

        .glass-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px;
            padding: 60px 40px; text-align: center; width: 100%; max-width: 500px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        #clock { font-size: 4.5rem; font-weight: 600; margin-bottom: 10px; text-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        
        .section-box { padding: 20px; background: rgba(255, 255, 255, 0.05); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); flex-shrink: 0; }
        .section-title { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: #888; margin-bottom: 10px; display: block; letter-spacing: 2px; }
        
        .social-link {
            text-decoration: none; color: white; background: rgba(255, 255, 255, 0.1);
            padding: 12px; border-radius: 12px; font-size: 0.9rem; display: flex;
            align-items: center; justify-content: center; gap: 10px; transition: 0.3s;
            margin-bottom: 8px; border: none; width: 100%; cursor: pointer;
        }
        .social-link:hover { background: rgba(255, 255, 255, 0.2); transform: translateX(5px); }
        
        .footer-text { margin-top: auto; padding-top: 20px; font-size: 0.6rem; opacity: 0.3; text-align: center; width: 100%; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="toggleMenu()">
        <div style="width: 25px; height: 3px; background-color: white; margin: 5px 0; border-radius: 2px;"></div>
        <div style="width: 25px; height: 3px; background-color: white; margin: 5px 0; border-radius: 2px;"></div>
        <div style="width: 25px; height: 3px; background-color: white; margin: 5px 0; border-radius: 2px;"></div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="section-box">
            <span class="section-title">Ses Denetimi</span>
            <button onclick="toggleMusic()" id="musicBtn" class="social-link">⏸️ Müziği Durdur</button>
            <audio id="bgMusic" loop><source src="buyuk-insan.mp3" type="audio/mpeg"></audio>
        </div>

        <div class="section-box">
            <span class="section-title">Seolx Web Sunucusu</span>
            <p style="font-size: 0.85rem; line-height: 1.5; opacity: 0.9;">
                Sanalın içinden geçmek için doğdum. Seolx Web Sunucusu üzerinden dijital projelerimi yönetiyorum.
            </p>
        </div>

        <div class="section-box" style="background: none; border: none; padding: 0;">
            <span class="section-title">Bağlantılar</span>
            <a href="https://www.tiktok.com/@farazi1881" target="_blank" class="social-link">🎵 TikTok</a>
            <a href="https://x.com/Hmayan20" target="_blank" class="social-link">🐦 X (Twitter)</a>
            <a href="https://discord.gg/CmM9fdWc" target="_blank" class="social-link">💬 Discord</a>
            <a href="https://instagram.com/hamza.gsafs" target="_blank" class="social-link">📸 Instagram</a>
            <a href="https://www.youtube.com" target="_blank" class="social-link" style="color: #FF0000;">🎬 YouTube</a>
        </div>

        <div class="footer-text">© 2026 Seolx Web Sunucusu <br> Tüm Hakları Saklıdır.</div>
    </div>

    <div class="glass-card">
        <div id="greeting" style="letter-spacing: 3px; opacity: 0.7; font-size: 0.9rem;">YÜKLENİYOR...</div>
        <div id="clock">00:00:00</div>
        <div id="date" style="opacity: 0.5; font-size: 0.9rem;">...</div>
    </div>

    <script>
        const music = document.getElementById("bgMusic");
        const btn = document.getElementById("musicBtn");
        let hasStarted = false;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            if (!hasStarted) { music.play().catch(e => console.log("Etkileşim bekleniyor")); hasStarted = true; }
        }

        function toggleMusic() {
            if (music.paused) { music.play(); btn.innerHTML = "⏸️ Müziği Durdur"; }
            else { music.pause(); btn.innerHTML = "▶️ Müziği Başlat"; }
        }

        function updateClock() {
            const now = new Date();
            let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            h = h < 10 ? "0" + h : h; m = m < 10 ? "0" + m : m; s = s < 10 ? "0" + s : s;
            document.getElementById("clock").innerText = h + ":" + m + ":" + s;
            let greeting = h < 12 ? "GÜNAYDIN KULLANICI" : h < 18 ? "TÜNAYDIN KULLANICI" : "İYİ AKŞAMLAR KULLANICI";
            document.getElementById("greeting").innerText = greeting;
            document.getElementById("date").innerText = now.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' });
        }
        setInterval(updateClock, 1000); updateClock();
    </script>
</body>
</html>
