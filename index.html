<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEOLX</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #container { text-align: center; }

        /* Ana Ekran */
        h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            letter-spacing: 15px;
            margin-bottom: 30px;
            font-weight: 900;
            text-transform: uppercase;
        }

        #enter-btn {
            background: transparent;
            color: #fff;
            border: 1px solid #444;
            padding: 12px 40px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.4s ease;
            letter-spacing: 2px;
        }

        #enter-btn:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        /* Çok Yakında Ekranı */
        #coming-soon-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            animation: fadeIn 1.5s ease;
        }

        #coming-soon-text {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 5px;
        }

        /* Yuvarlak Yükleme Animasyonu (Spinner) */
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: #fff; /* Sadece üst kısım beyaz */
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="main-screen">
            <h1>SEOLX</h1>
            <button id="enter-btn" onclick="startExperience()">İçeri Gir</button>
        </div>
        
        <div id="coming-soon-screen">
            <div id="coming-soon-text">ÇOK YAKINDA</div>
            <div class="loader"></div> </div>
    </div>

    <audio id="bg-music" src="music.mp3" loop></audio>

    <script>
        function startExperience() {
            // Müziği başlat
            const music = document.getElementById('bg-music');
            music.play().catch(e => console.log("Müzik başlatılamadı:", e));

            // Ekranları değiştir
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('coming-soon-screen').style.display = 'flex';
        }
    </script>

</body>
</html>
