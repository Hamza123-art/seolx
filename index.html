<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SEOLX</title>
    <style>
        /* Ekranın her yerini zorla kapla */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Kaydırma çubuğunu öldür */
            background-color: #000;
            font-family: sans-serif;
        }

        /* Her şeyi ekrana göre tam ortalayan ana kap */
        #main-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: background-color 3s ease;
        }

        /* 1. SEOLX ve Buton Kısmı */
        #start-ui {
            z-index: 10;
            text-align: center;
            width: 90%; /* Mobilde kenarlara yapışmasın */
        }

        #start-ui h1 {
            color: white;
            font-size: clamp(3rem, 10vw, 6rem); /* Ekrana göre büyüyüp küçülen yazı */
            letter-spacing: 5px;
            margin-bottom: 20px;
        }

        #enter-btn {
            background: none;
            color: white;
            border: 2px solid white;
            padding: 15px 40px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
        }

        #enter-btn:hover {
            background: white;
            color: black;
        }

        /* 2. Video: Ekranı yamultmadan kaplaması için */
        #intro-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%); /* Tam merkezleme */
            object-fit: cover; /* Videoyu kırpmadan/yamultmadan sığdırır */
            display: none;
        }

        /* 3. Final Yazısı */
        #final-text {
            color: white;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            text-align: center;
            opacity: 0;
            z-index: 20;
            transition: opacity 2s ease;
            padding: 0 20px;
        }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="start-ui">
            <h1>SEOLX</h1>
            <button id="enter-btn">İçeri Gir</button>
        </div>

        <video id="intro-video" playsinline>
            <source src="second.mp4" type="video/mp4">
        </video>

        <div id="final-text">Burda Olman Tesadüf değil</div>
    </div>

    <audio id="bg-music" src="music.mp3"></audio>

    <script>
        const container = document.getElementById('main-container');
        const btn = document.getElementById('enter-btn');
        const video = document.getElementById('intro-video');
        const startUi = document.getElementById('start-ui');
        const finalText = document.getElementById('final-text');
        const music = document.getElementById('bg-music');

        btn.onclick = () => {
            startUi.style.display = 'none';
            video.style.display = 'block';
            video.play();
        };

        video.onended = () => {
            video.style.display = 'none';
            container.style.backgroundColor = 'white';
            music.play();

            setTimeout(() => {
                container.style.backgroundColor = 'black';
                setTimeout(() => {
                    finalText.style.opacity = '1';
                }, 2500);
            }, 600);
        };
    </script>
</body>
</html>
