<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seolx | Elite Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #000; color: white; overflow: hidden; height: 100vh; }

        /* ARKA PLAN VİDEOSU */
        #bg-video {
            position: fixed; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            transform: translate(-50%, -50%);
            z-index: -2; object-fit: cover;
        }

        .overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3); z-index: -1;
        }

        /* GİRİŞ EKRANI */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; display: flex; justify-content: center; align-items: center;
            background: #000;
        }
        .login-content h1 { font-family: 'Bebas Neue', sans-serif; font-size: 8rem; letter-spacing: 15px; text-shadow: 0 0 40px rgba(255, 255, 255, 0.4); }
        .enter-btn { background: #fff; color: #000; border: none; padding: 20px 60px; font-size: 1.1rem; font-weight: 700; border-radius: 50px; cursor: pointer; transition: 0.4s; text-transform: uppercase; }
        .enter-btn:hover { background: #00ff88; transform: scale(1.1); box-shadow: 0 0 40px rgba(0, 255, 136, 0.6); }

        /* ANA SİTE */
        #main-site { display: none; opacity: 0; transition: 1.5s ease-in-out; }

        /* SAAT (SAĞ ÜST - KÜÇÜK) */
        .glass-card {
            position: fixed; top: 25px; right: 80px; /* Menü butonunun yanına */
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            border-radius: 20px; padding: 10px 20px; text-align: right;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }
        #clock { font-size: 1.8rem; font-weight: 700; color: #fff; line-height: 1; }
        #date { font-size: 0.7rem; opacity: 0.6; letter-spacing: 1px; margin-top: 3px; }

        /* YAN MENÜLER */
        .sidebar {
            position: fixed; top: 0; width: 320px; height: 100%;
            background: rgba(10, 10, 30, 0.9); backdrop-filter: blur(20px);
            z-index: 1001; transition: 0.5s; padding: 40px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .sidebar-left { left: -330px; } .sidebar-left.active { left: 0; }
        .sidebar-right { right: -330px; } .sidebar-right.active { right: 0; }
        
        .menu-btn { position: fixed; top: 25px; z-index: 1002; cursor: pointer; background: rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; }
        .btn-left { left: 25px; } .btn-right { right: 25px; }

        .social-button { text-decoration: none; color: white; display: block; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 15px; text-align: center; margin-bottom: 10px; transition: 0.3s; }
        .social-button:hover { background: rgba(0, 255, 136, 0.2); }
    </style>
</head>
<body>

    <video loop playsinline id="bg-video">
        <source src="https://raw.githubusercontent.com/Hamza123-art/seolx/main/arka.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div id="login-screen">
        <div class="login-content">
            <h1>SEOLX</h1>
            <button class="enter-btn" onclick="enterSite()">Giriş Yap</button>
        </div>
    </div>

    <div id="main-site">
        <div class="menu-btn btn-left" onclick="toggleSidebar('sidebar-left')">⚙️</div>
        <div class="menu-btn btn-right" onclick="toggleSidebar('sidebar-right')">🔗</div>

        <div class="glass-card">
            <div id="clock">00:00</div>
            <div id="date">...</div>
        </div>

        <div class="sidebar sidebar-left" id="sidebar-left">
            <h2 style="color:#00ff88; font-size:1.1rem; margin-bottom:20px;">MEDYA PANELİ</h2>
            <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:20px;">
                <span style="font-size:0.7rem; color:#00ff88; font-weight:700;">🎧 MÜZİK AÇILDIĞINDA VİDEO SUSAR</span>
                <iframe id="music-frame" style="border-radius:15px; margin-top:15px;" 
                    src="https://www.youtube.com/embed/videoseries?list=PLtDUHIXNDtvvorvm_fRg1GRng7B7O2Njs" 
                    width="100%" height="160" frameborder="0"></iframe>
                
                <button onclick="muteVideo()" style="width:100%; margin-top:10px; padding:8px; background:rgba(255,0,0,0.2); border:none; color:white; border-radius:10px; cursor:pointer; font-size:0.7rem;">VİDEOYU SUSTUR (MANUEL)</button>
            </div>
        </div>

        <div class="sidebar sidebar-right" id="sidebar-right">
            <h2 style="color:#00ff88; text-align:right; font-size:1.1rem; margin-bottom:20px;">SOSYAL</h2>
            <a href="https://www.tiktok.com/@farazi1881" target="_blank" class="social-button">🎵 TikTok</a>
            <a href="https://instagram.com/hamza.gsafs" target="_blank" class="social-button">📸 Instagram</a>
        </div>
    </div>

    <script>
        const video = document.getElementById('bg-video');

        function enterSite() {
            const ls = document.getElementById('login-screen');
            const ms = document.getElementById('main-site');
            
            // Tarayıcı izinleri için giriş anında videoyu ve sesi başlat
            video.muted = false; 
            video.volume = 0.5; // Başlangıç ses seviyesi %50
            video.play();
            
            ls.style.opacity = '0';
            setTimeout(() => {
                ls.style.display = 'none';
                ms.style.display = 'block';
                setTimeout(() => { ms.style.opacity = '1'; }, 50);
            }, 1000);
        }

        // Müzik çalar ile video sesi arasındaki ilişki
        // YouTube iframe ile etkileşime girildiğinde (tıklandığında) videoyu sustur
        window.addEventListener('blur', function() {
            if (document.activeElement.id === 'music-frame') {
                video.volume = 0;
                console.log("Müzik algılandı, video susturuldu.");
            }
        });

        function muteVideo() {
            video.volume = 0;
        }

        function toggleSidebar(id) { document.getElementById(id).classList.toggle('active'); }

        function updateClock() {
            const now = new Date();
            let h = now.getHours().toString().padStart(2, '0');
            let m = now.getMinutes().toString().padStart(2, '0');
            let s = now.getSeconds().toString().padStart(2, '0');
            document.getElementById("clock").innerText = h + ":" + m + ":" + s;
            document.getElementById("date").innerText = now.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long' });
        }
        setInterval(updateClock, 1000); updateClock();
    </script>
</body>
</html>
