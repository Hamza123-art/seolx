<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seolx | Başlıyoruz...</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #000; 
            color: white; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
            font-family: 'Poppins', sans-serif; 
        }

        .container { 
            text-align: center; 
            width: 90%; /* Kenarlardan pay bırakır */
            max-width: 1200px;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3rem, 10vw, 8rem); /* Ekran küçüldükçe küçülür, büyüdükçe büyür */
            letter-spacing: clamp(5px, 2vw, 15px);
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            margin-bottom: 10px;
            line-height: 1.1;
        }

        p {
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            letter-spacing: clamp(2px, 1vw, 6px);
            opacity: 0.5;
            text-transform: uppercase;
            margin-bottom: clamp(20px, 5vh, 40px);
        }

        #countdown {
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 25px rgba(0, 255, 136, 0.4);
            font-variant-numeric: tabular-nums;
        }

        /* Başlatma Ekranı */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999;
            display: flex; justify-content: center; align-items: center;
        }
        
        .start-btn {
            background: transparent; color: #fff; border: 2px solid #fff; 
            padding: 15px 40px; 
            font-size: clamp(0.8rem, 1.5vw, 1.1rem); 
            letter-spacing: 2px;
            border-radius: 5px; cursor: pointer; transition: 0.3s;
        }
        .start-btn:hover { background: #fff; color: #000; }

        /* TELEFONLAR İÇİN ÖZEL AYAR (Dikey Ekran) */
        @media (max-width: 600px) {
            h1 { letter-spacing: 5px; }
            #countdown { font-size: 2.5rem; }
        }

        /* TELEVİZYONLAR VEYA ÇOK GENİŞ EKRANLAR İÇİN */
        @media (min-width: 1921px) {
            h1 { font-size: 10rem; }
            #countdown { font-size: 7rem; }
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button class="start-btn" onclick="startSystem()">İÇERİ GİR</button>
    </div>

    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <h1>SEOLX SANALIN ASIL SAHİBİDİR!!!</h1>
        <p>Yakında...</p>
        <div id="countdown">Yükleniyor...</div>
    </div>

    <script>
        function startSystem() {
            const music = document.getElementById('bg-music');
            music.play().catch(e => console.log("Müzik dosyası bulunamadı veya oynatılamadı."));
            document.getElementById('overlay').style.display = 'none';
        }

        const targetDate = new Date("March 18, 2026 20:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById("countdown").innerHTML = "SÜRE DOLDU";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            let display = "";
            if (days > 0) display += days + " Gün ";
            
            display += (hours < 10 ? "0" + hours : hours) + ":" + 
                       (minutes < 10 ? "0" + minutes : minutes) + ":" + 
                       (seconds < 10 ? "0" + seconds : seconds);

            document.getElementById("countdown").innerHTML = display;
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
