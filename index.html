<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seolx | DEVELOPER</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #000000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            padding: 20px;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- MENÜ TUŞU --- */
        .menu-btn {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 1000;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
        }

        .menu-btn div {
            width: 25px;
            height: 3px;
            background-color: white;
            margin: 5px 0;
            transition: 0.4s;
            border-radius: 2px;
        }

        /* --- YAN PANEL --- */
        .sidebar {
            position: fixed;
            top: 0;
            left: -350px;
            width: 320px;
            height: 100%;
            background: rgba(10, 10, 30, 0.9);
            backdrop-filter: blur(25px);
            z-index: 999;
            transition: 0.5s cubic-bezier(0.77,0.2,0.05,1.0);
            padding: 80px 30px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar.active { left: 0; }

        /* --- ANA SAAT --- */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 60px 40px;
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        #greeting { font-size: 1rem; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 10px; opacity: 0.7; }
        #clock { font-size: 4.5rem; font-weight: 600; margin-bottom: 10px; }
        #date { font-size: 1rem; opacity: 0.5; }

        /* --- İÇERİK STİLLERİ --- */
        .section-box {
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .section-title { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: #888; margin-bottom: 10px; display: block; letter-spacing: 2px; }
        
        .social-link {
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 12px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
            margin-bottom: 8px;
            border: none;
            width: 100%;
            cursor: pointer;
        }

        .social-link:hover { background: rgba(255, 255, 255, 0.2); transform: translateX(5px); }

        .footer { position: absolute; bottom: 30px; font-size: 0.6rem; opacity: 0.3; }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="toggleMenu()">
        <div></div><div></div><div></div>
    </div>

    <div class="sidebar" id="sidebar">
        
        <div class="section-box">
            <span class="section-title">Müzik Çalar</span>
            <p style="font-size: 0.8rem; margin-bottom: 10px; opacity: 0.8;">Büyük İnsan (Instrumental)</p>
            <button onclick="toggleMusic()" id="musicBtn" class="social-link">
                ▶️ Müziği Başlat
            </button>
            <audio id="bgMusic" loop>
                <source src="buyuk-insan.mp3" type="audio/mpeg">
            </audio>
        </div>

        <div class="section-box">
            <span class="section-title">Hakkımda</span>
            <p style="font-size: 0.9rem; line-height: 1.5;">Sanalın İçinden Geçmek İçin Doğdum.</p>
        </div>

        <div class="section-box" style="background: none; border: none; padding: 0;">
            <span class="section-title">Sosyal Medya</span>
            <a href="https://www.tiktok.com/@farazi1881" target="_blank" class="social-link">🎵 TikTok</a>
            <a href="https://x.com/Hmayan20" target="_blank" class="social-link">🐦 X (Twitter)</a>
            <a href="https://discord.gg/CmM9fdWc" target="_blank" class="social-link">💬 Discord</a>
            <a href="https://instagram.com/hamza.gsafs" target="_blank" class="social-link">📸 Instagram</a>
        </div>
        
        <div class="footer">SEOLX.VERCEL.APP • 2026</div>
    </div>

    <div class="glass-card">
        <div id="greeting">Yükleniyor...</div>
        <div id="clock">00:00:00</div>
        <div id="date">Yükleniyor...</div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        // Müzik Kontrolü
        const music = document.getElementById("bgMusic");
        const btn = document.getElementById("musicBtn");

        function toggleMusic() {
            if (music.paused) {
                music.play().catch(e => alert("Müzik dosyası henüz yüklenmemiş olabilir."));
                btn.innerHTML = "⏸️ Müziği Durdur";
            } else {
                music.pause();
                btn.innerHTML = "▶️ Müziği Başlat";
            }
        }

        // Saat Güncelleme
        function updateClock() {
            const now = new Date();
            let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            h = h < 10 ? "0" + h : h; m = m < 10 ? "0" + m : m; s = s < 10 ? "0" + s : s;
            document.getElementById("clock").innerText = h + ":" + m + ":" + s;

            let greeting = "";
            if (h >= 5 && h < 12) greeting = "Günaydın Kullanıcı";
            else if (h >= 12 && h < 18) greeting = "Tünaydın Kullanıcı";
            else if (h >= 18 && h < 22) greeting = "İyi Akşamlar Kullanıcı";
            else greeting = "İyi Geceler Kullanıcı";
            document.getElementById("greeting").innerText = greeting;

            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById("date").innerText = now.toLocaleDateString('tr-TR', options);
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
