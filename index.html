<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seolx | Premium Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { background: #000; color: white; overflow: hidden; height: 100vh; }

        /* INTRO EKRANI */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center;
        }

        .netflix-text {
            font-family: 'Bebas Neue', sans-serif; font-size: 8rem; color: #E50914;
            letter-spacing: 5px; position: relative; display: flex;
        }

        /* SEOL Silinme Animasyonu */
        .seol-part { animation: fadeOut 0.5s forwards 2s; }
        @keyframes fadeOut { to { opacity: 0; width: 0; margin-right: 0; } }

        /* X'in Patlama Animasyonu */
        .x-part { 
            display: inline-block; 
            animation: zoomAndColor 1.5s forwards 2.5s; 
        }

        @keyframes zoomAndColor {
            0% { transform: scale(1); filter: drop-shadow(0 0 0 red); }
            50% { transform: scale(1.5); filter: drop-shadow(0 0 20px red); }
            100% { transform: scale(50); opacity: 0; filter: hue-rotate(360deg); }
        }

        /* GİRİŞ EKRANI */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9000; display: none; justify-content: center; align-items: center;
            background: #000;
        }

        #bg-video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0.4;
        }

        .login-content {
            position: relative; z-index: 9001; text-align: center;
            background: rgba(0,0,0,0.6); padding: 50px; border-radius: 20px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
        }

        .login-content h1 { font-family: 'Bebas Neue', sans-serif; font-size: 4rem; color: #E50914; margin-bottom: 10px; }
        .login-content p { font-size: 1.2rem; opacity: 0.8; margin-bottom: 30px; }

        .enter-btn {
            background: #E50914; color: white; border: none; padding: 15px 40px;
            font-size: 1.1rem; font-weight: 600; border-radius: 5px; cursor: pointer;
            transition: 0.3s; text-transform: uppercase; letter-spacing: 2px;
        }
        .enter-btn:hover { background: #b20710; transform: scale(1.05); box-shadow: 0 0 20px rgba(229, 9, 20, 0.4); }

        /* ANA SİTE (DASHBOARD) */
        #main-site { display: none; opacity: 0; transition: 2s; }

        /* Dashboard Stilleri (Önceki kodundan gelenler) */
        .dashboard-container {
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #000000);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .sidebar {
            position: fixed; top: 0; width: 300px; height: 100%;
            background: rgba(10, 10, 30, 0.9); backdrop-filter: blur(20px);
            z-index: 1000; transition: 0.5s; padding: 40px 20px; border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; flex-direction: column; gap: 15px; overflow-y: auto;
        }
        .sidebar-left { left: -310px; } .sidebar-left.active { left: 0; }
        .sidebar-right { right: -310px; } .sidebar-right.active { right: 0; }
        .menu-btn { position: fixed; top: 25px; z-index: 1001; cursor: pointer; background: rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; }
        .btn-left { left: 25px; } .btn-right { right: 25px; }
        .glass-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border-radius: 40px; padding: 50px 30px; text-align: center; width: 450px; border: 1px solid rgba(255,255,255,0.1); }
        #clock { font-size: 4rem; font-weight: 600; }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div class="netflix-text">
            <span class="seol-part">SEOL</span><span class="x-part">X</span>
        </div>
    </div>

    <div id="login-screen">
        <video id="bg-video" loop muted playsinline>
            <source src="arka.mp4" type="video/mp4">
        </video>
        <div class="login-content">
            <h1>SEOLX</h1>
            <p>Hoş Geldiniz</p>
            <button class="enter-btn" onclick="enterSite()">Giriş Yap</button>
        </div>
    </div>

    <div id="main-site">
        <div class="menu-btn btn-left" onclick="toggleSidebar('sidebar-left')">⚙️</div>
        <div class="menu-btn btn-right" onclick="toggleSidebar('sidebar-right')">🔗</div>

        <div class="dashboard-container">
            <div class="sidebar sidebar-left" id="sidebar-left">
                <h2 style="color:#00ff88; margin-bottom:15px;">PANEL</h2>
                <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:10px;">
                    <span style="font-size:0.7rem; color:#00ff88;">🎧 PLAYLIST</span>
                    <iframe style="border-radius:12px; margin-top:10px;" src="https://www.youtube.com/embed/videoseries?list=PLtDUHIXNDtvvorvm_fRg1GRng7B7O2Njs" width="100%" height="160" frameborder="0" allow="autoplay"></iframe>
                </div>
                <div style="margin-top:15px; font-size:0.8rem;">📍 Bursa: 18°C ☁️</div>
            </div>

            <div class="sidebar sidebar-right" id="sidebar-right">
                <h2 style="color:#00ff88; text-align:right;">SOSYAL</h2>
                <a href="https://instagram.com/hamza.gsafs" target="_blank" style="text-decoration:none; color:white; display:block; padding:10px; background:rgba(255,255,255,0.1); border-radius:10px; margin-top:10px; text-align:center;">📸 Instagram</a>
                <a href="https://discord.gg/CmM9fdWc" target="_blank" style="text-decoration:none; color:white; display:block; padding:10px; background:rgba(255,255,255,0.1); border-radius:10px; margin-top:5px; text-align:center;">💬 Discord</a>
            </div>

            <div class="glass-card">
                <div id="greeting" style="letter-spacing:5px; opacity:0.7;">GİRİŞ YAPILDI</div>
                <div id="clock">00:00:00</div>
                <div id="date" style="opacity:0.5;">...</div>
            </div>
        </div>
    </div>

    <script>
        // Intro bittikten sonra Giriş Ekranını göster
        setTimeout(() => {
            const video = document.getElementById('bg-video');
            document.getElementById('intro-overlay').style.display = 'none';
            document.getElementById('login-screen').style.display = 'flex';
            video.play(); // Arka plan videosu başlar
        }, 4500);

        // Siteye Giriş Yapınca
        function enterSite() {
            // Videoyu durdur
            document.getElementById('bg-video').pause();
            
            // Ekranları değiştir
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-site').style.display = 'block';
            setTimeout(() => {
                document.getElementById('main-site').style.opacity = '1';
            }, 100);
        }

        // Dashboard Fonksiyonları
        function toggleSidebar(id) { document.getElementById(id).classList.toggle('active'); }

        function updateClock() {
            const now = new Date();
            let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            h = h < 10 ? "0" + h : h; m = m < 10 ? "0" + m : m; s = s < 10 ? "0" + s : s;
            document.getElementById("clock").innerText = h + ":" + m + ":" + s;
            document.getElementById("date").innerText = now.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' });
        }
        setInterval(updateClock, 1000); updateClock();
    </script>
</body>
</html>
