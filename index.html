<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seolx | Bakımda...</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #000; 
            color: white; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
            font-family: 'Poppins', sans-serif; 
        }

        /* EKRAN KARARTMA GÖLGESİ */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,1) 90%);
            pointer-events: none;
            z-index: 1;
        }

        .container { 
            text-align: center; 
            width: 90%; 
            max-width: 1200px;
            position: relative;
            z-index: 2;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3rem, 12vw, 10rem); /* Bakım yazısı daha heybetli */
            letter-spacing: clamp(5px, 2vw, 15px);
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
            margin-bottom: 10px;
            line-height: 1.1;
            color: #fff;
        }

        p {
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            letter-spacing: 4px;
            opacity: 0.4;
            text-transform: uppercase;
            color: #00ff88; /* Durum rengi neon yeşil */
        }

        /* Giriş Ekranı */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999;
            display: flex; justify-content: center; align-items: center;
        }
        
        .start-btn {
            background: transparent; color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.3); 
            padding: 15px 45px; 
            font-size: 1rem; 
            letter-spacing: 3px;
            border-radius: 2px; cursor: pointer; transition: 0.5s;
            text-transform: uppercase;
        }
        .start-btn:hover { color: #fff; border-color: #fff; box-shadow: 0 0 30px rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="overlay">
        <button class="start-btn" onclick="startSystem()">İçeri Gir</button>
    </div>

    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <h1>BAKIM MOLASI</h1>
        <p>Sistem Güncelleniyor...</p>
    </div>

    <script>
        function startSystem() {
            const music = document.getElementById('bg-music');
            music.play().catch(e => console.log("Müzik dosyası bulunamadı."));
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
