<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TEST</title>
    <style>
        /* Tarayıcı saçmalıklarını sıfırla */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Ekranın gerçek yüksekliğini her cihazda sabitle */
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            /* Mobil tarayıcı yükseklik hatasını önlemek için */
            height: -webkit-fill-available; 
        }

        /* GRID: Dünyanın en sağlam ortalama yöntemidir */
        #master-wrapper {
            display: grid;
            place-items: center; /* Hem yatay hem dikey TAM ORTA */
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            transition: background-color 3s ease;
        }

        /* Giriş Grubu */
        #start-box {
            z-index: 50;
            text-align: center;
        }

        #start-box h1 {
            color: white;
            font-size: clamp(2.5rem, 12vw, 5rem);
            letter-spacing: 0.2em;
            margin-bottom: 2rem;
            font-family: sans-serif;
            font-weight: 900;
        }

        #enter-btn {
            background: transparent;
            color: white;
            border: 1px solid white;
            padding: 1rem 3rem;
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Video: Arka planı tamamen kaplasın ama merkezde kalsın */
        #bg-video {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            object-fit: cover;
            display: none;
            z-index: 1;
        }

        /* Final Yazısı: O da tam ortada */
        #final-text {
            color: white;
            font-size: clamp(1.2rem, 5vw, 2rem);
            opacity: 0;
            text-align: center;
            z-index: 60;
            transition: opacity 2s ease;
            position: absolute; /* Master wrapper içindeki place-items sayesinde ortalanır */
        }
    </style>
</head>
<body>

    <div id="master-wrapper">
        <div id="start-box">
            <h1>SEOLX</h1>
            <button id="enter-btn">İçeri Gir</button>
        </div>

        <video id="bg-video" playsinline>
            <source src="second.mp4" type="video/mp4">
        </video>

        <div id="final-text">Burda Olman Tesadüf değil</div>
    </div>

    <audio id="bg-music" src="music.mp3"></audio>

    <script>
        const wrapper = document.getElementById('master-wrapper');
        const btn = document.getElementById('enter-btn');
        const video = document.getElementById('bg-video');
        const startBox = document.getElementById('start-box');
        const finalText = document.getElementById('final-text');
        const music = document.getElementById('bg-music');

        btn.onclick = () => {
            startBox.style.display = 'none';
            video.style.display = 'block';
            video.play();
        };

        video.onended = () => {
            video.style.display = 'none';
            wrapper.style.backgroundColor = 'white';
            music.play();

            setTimeout(() => {
                wrapper.style.backgroundColor = 'black';
                setTimeout(() => {
                    finalText.style.opacity = '1';
                }, 2500);
            }, 600);
        };
    </script>
</body>
</html>
