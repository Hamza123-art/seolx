<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seolx | Başlıyoruz...</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            color: white; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
            font-family: 'Poppins', sans-serif; 
        }

        .container { text-align: center; }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 8rem;
            letter-spacing: 15px;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            margin-bottom: 5px;
        }

        p {
            font-size: 1.2rem;
            letter-spacing: 6px;
            opacity: 0.5;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        #countdown {
            font-size: 4rem;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 25px rgba(0, 255, 136, 0.4);
            font-variant-numeric: tabular-nums;
        }

        /* Başlatma Ekranı (Müzik İçin) */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999;
            display: flex; justify-content: center; align-items: center;
        }
        .start-btn {
            background: transparent; color: #fff; border: 2px solid #fff; 
            padding: 15px 40px; font-size: 1rem; letter-spacing: 2px;
            border-radius: 5px; cursor: pointer; transition: 0.3s;
        }
        .start-btn:hover { background: #fff; color: #000; }
    </style>
</head>
<body>

    <div id="overlay">
        <button class="start-btn" onclick="startSystem()">SİSTEMİ BAŞLAT</button>
    </div>

    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <h1>SEOLX</h1>
        <p>Hoş Geldiniz</p>
        <div id="countdown">Yükleniyor...</div>
    </div>

    <script>
        function startSystem() {
            document.getElementById('bg-music').play();
            document.getElementById('overlay').style.display = 'none';
        }

        // Hedef Zaman: 18 Mart 2026, 20:00:00
        const targetDate = new Date("March 18, 2026 20:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById("countdown").innerHTML = "SÜRE DOLDU";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Eğer 0 günden fazlaysa gün bilgisini de gösterir, yoksa sadece saat:dakika:saniye
            let display = "";
            if (days > 0) display += days + "g ";
            
            display += (hours < 10 ? "0" + hours : hours) + ":" + 
                       (minutes < 10 ? "0" + minutes : minutes) + ":" + 
                       (seconds < 10 ? "0" + seconds : seconds);

            document.getElementById("countdown").innerHTML = display;
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
