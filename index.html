<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEOLX</title>
    <style>
        /* Arka Plan ve Genel Ayarlar */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #container {
            text-align: center;
        }

        /* SEOLX Yazısı */
        h1 {
            font-size: 5rem;
            letter-spacing: 15px;
            margin-bottom: 20px;
            font-weight: 900;
        }

        /* İçeri Gir Butonu */
        #enter-btn {
            background: transparent;
            color: #fff;
            border: 2px solid #fff;
            padding: 10px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        #enter-btn:hover {
            background: #fff;
            color: #000;
        }

        /* Çok Yakında Ekranı (İlk koddaki font ve boyut korundu) */
        #coming-soon {
            display: none;
            font-size: 3rem;
            font-weight: 300;
            animation: fadeIn 2s ease;
        }

        /* Yükleme Halkası (Spinner) */
        .loader {
            margin: 20px auto 0; /* Yazının altına boşluk bırakıp ortalar */
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="main-screen">
            <h1>SEOLX</h1>
            <button id="enter-btn" onclick="enterSite()">İçeri Gir</button>
        </div>
        
        <div id="coming-soon">
            <div>Çok Yakında</div>
            <div class="loader"></div>
        </div>
    </div>

    <audio id="bg-music" src="music.mp3" loop></audio>

    <script>
        function enterSite() {
            const music = document.getElementById('bg-music');
            music.play().catch(error => {
                console.log("Müzik çalma hatası: " + error);
            });

            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('coming-soon').style.display = 'block';
        }
    </script>

</body>
</html>
