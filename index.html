<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="OcD6oP-dNgAYSKV195-8s7gWdz8xsKynrvv1X37tJmI" />
    <title>Seolx | Web Sunucusu ve Dijital Portfolyo</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #000000);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            color: white; padding: 20px; overflow: hidden; transition: 0.3s;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes policeFlash { 0% { background: #ff0000; } 50% { background: #0000ff; } 100% { background: #ff0000; } }
        .emergency-mode { animation: policeFlash 0.2s infinite !important; }

        .menu-btn {
            position: fixed; top: 25px; left: 25px; z-index: 1001; cursor: pointer;
            background: rgba(255, 255, 255, 0.1); padding: 12px; border-radius: 12px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .sidebar {
            position: fixed; top: 0; left: -350px; width: 320px; height: 100%;
            background: rgba(10, 10, 30, 0.95); backdrop-filter: blur(25px);
            z-index: 1000; transition: 0.5s cubic-bezier(0.77,0.2,0.05,1.0);
            padding: 80px 20px 40px 20px; border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; flex-direction: column; gap: 20px; overflow-y: auto;
            scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.2) transparent;
        }
        .sidebar.active { left: 0; }

        .section-box { padding: 20px; background: rgba(255, 255, 255, 0.05); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); flex-shrink: 0; }
        .section-title { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: #888; margin-bottom: 10px; display: block; letter-spacing: 2px; }
        
        /* Galeri Düzeni */
        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; }
        .gallery-item { 
            width: 100%; height: 100px; object-fit: cover; border-radius: 10px; 
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s;
        }
        .gallery-item:hover { transform: scale(1.05); border-color: #00ff88; }

        .social-link {
            text-decoration: none; color: white; background: rgba(255, 255, 255, 0.1);
            padding: 12px; border-radius: 12px; font-size: 0.85rem; display: flex;
            align-items: center; justify-content: center; gap: 10px; transition: 0.3s;
            margin-bottom: 8px; border: none; width: 100%; cursor: pointer;
        }
        .social-link:hover { background: rgba(255, 255, 255, 0.2); transform: translateX(5px); }

        .tool-input, .msg-area {
            width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px; padding: 10px; color: white; margin-bottom: 10px; font-size: 0.8rem;
        }
        .msg-area { height: 80px; resize: none; }

        .glass-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px;
            padding: 60px 40px; text-align: center; width: 100%; max-width: 500px;
        }
        #clock { font-size: 4.5rem; font-weight: 600; margin-bottom: 10px; }
        .footer-text { margin-top: auto; padding-top: 20px; font-size: 0.6rem; opacity: 0.3; text-align: center; }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="toggleMenu()">
        <div style="width: 25px; height: 3px; background-color: white; margin: 5px 0; border-radius: 2px;"></div>
        <div style="width: 25px; height: 3px; background-color: white; margin: 5px 0; border-radius: 2px;"></div>
        <div style="width: 25px; height: 3px; background-color: white; margin: 5px 0; border-radius: 2px;"></div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="section-box">
            <span class="section-title">Fotoğraf Galerisi</span>
            <div class="gallery-grid">
                <img src="img/resim1.jpg" class="gallery-item" onclick="window.open(this.src)">
                <img src="img/resim2.jpg" class="gallery-item" onclick="window.open(this.src)">
                <img src="img/resim3.jpg" class="gallery-item" onclick="window.open(this.src)">
                <img src="img/resim4.jpg" class="gallery-item" onclick="window.open(this.src)">
            </div>
            <p style="font-size: 0.6rem; margin-top: 10px; opacity: 0.5;">* Fotoğrafa tıklayarak büyütebilirsin.</p>
        </div>

        <div class="section-box">
            <span class="section-title">Terminal Mesajı Bırak</span>
            <div id="msgCounter" style="font-size: 0.75rem; color: #00ff88; margin-bottom: 10px; font-weight: 600;">0 mesaj gönderildi</div>
            <form id="contactForm" action="https://formspree.io/f/xzdjeyrd" method="POST" onsubmit="countMessage()">
                <input type="text" name="name" class="tool-input" placeholder="Adınız / Nickname" required>
                <textarea name="message" class="msg-area" placeholder="Mesajınızı buraya yazın..." required></textarea>
                <button type="submit" class="social-link" style="background: rgba(0, 255, 136, 0.2);">🚀 Mesajı Gönder</button>
            </form>
        </div>

        <div class="section-box">
            <span class="section-title">Kronometre</span>
            <div id="chronoDisplay" style="font-size: 1.2rem; margin-bottom: 10px; text-align: center; font-weight: 600;">00:00:00</div>
            <div style="display: flex; gap: 5px;">
                <button onclick="startChrono()" class="social-link" style="font-size: 0.7rem;">Başlat</button>
                <button onclick="stopChrono()" class="social-link" style="font-size: 0.7rem;">Durdur</button>
                <button onclick="resetChrono()" class="social-link" style="font-size: 0.7rem;">Sıfırla</button>
            </div>
        </div>

        <div class="section-box">
            <span class="section-title">Zamanlayıcı (Dakika)</span>
            <input type="number" id="timerInput" class="tool-input" placeholder="Dakika giriniz">
            <div id="timerDisplay" style="font-size: 1.2rem; margin-bottom: 10px; text-align: center; font-weight: 600;">00:00</div>
            <button onclick="startTimer()" id="timerStartBtn" class="social-link">Başlat</button>
            <button onclick="stopEmergency()" id="timerStopBtn" class="social-link" style="display:none; background: #ff4757;">Durdur</button>
        </div>

        <div class="section-box">
            <span class="section-title">Bağlantılar</span>
            <a href="https://www.tiktok.com/@farazi1881" target="_blank" class="social-link">🎵 TikTok</a>
            <a href="https://x.com/Hmayan20" target="_blank" class="social-link">🐦 X</a>
            <a href="https://discord.gg/CmM9fdWc" target="_blank" class="social-link">💬 Discord</a>
            <a href="https://instagram.com/hamza.gsafs" target="_blank" class="social-link">📸 Instagram</a>
            <a href="https://open.spotify.com/playlist/6xBcLAwD3C58LM87UExaHd?si=Fojz6cV4TlWNu6Oli3hsJg&pi=fmfVzjN_SCaWT" target="_blank" class="social-link" style="border: 1px solid #1DB954;">🟢 Spotify</a>
            <a href="https://music.youtube.com/playlist?list=PLtDUHIXNDtvtRez_37mTOVa_AkRsF_-GU" target="_blank" class="social-link" style="border: 1px solid #f44336;">🔴 YT Music</a>
        </div>

        <div class="section-box">
            <button onclick="toggleMusic()" id="musicBtn" class="social-link">⏸️ Müziği Durdur</button>
            <audio id="bgMusic" loop><source src="buyuk-insan.mp3" type="audio/mpeg"></audio>
        </div>

        <div class="footer-text">© 2026 Seolx Web Sunucusu</div>
    </div>

    <div class="glass-card">
        <div id="greeting" style="letter-spacing: 3px; opacity: 0.7; font-size: 0.9rem;">YÜKLENİYOR...</div>
        <div id="clock">00:00:00</div>
        <div id="date" style="opacity: 0.5; font-size: 0.9rem;">...</div>
    </div>

    <script>
        // KODUN GERİ KALANINDAKİ JAVASCRIPT AYNI KALIYOR...
        let msgCount = parseInt(localStorage.getItem('seolxMsgCount')) || 0;
        document.getElementById('msgCounter').innerText = msgCount + " mesaj gönderildi";
        function countMessage() { msgCount++; localStorage.setItem('seolxMsgCount', msgCount); }

        const music = document.getElementById("bgMusic");
        const btn = document.getElementById("musicBtn");
        let hasStarted = false;
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            if (!hasStarted) { music.play().catch(e => console.log("Etkileşim bekleniyor")); hasStarted = true; }
        }
        function toggleMusic() {
            if (music.paused) { music.play(); btn.innerHTML = "⏸️ Müziği Durdur"; }
            else { music.pause(); btn.innerHTML = "▶️ Müziği Başlat"; }
        }
        function updateClock() {
            const now = new Date();
            let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            h = h < 10 ? "0" + h : h; m = m < 10 ? "0" + m : m; s = s < 10 ? "0" + s : s;
            document.getElementById("clock").innerText = h + ":" + m + ":" + s;
            let greeting = h < 12 ? "GÜNAYDIN" : h < 18 ? "TÜNAYDIN" : "İYİ AKŞAMLAR";
            document.getElementById("greeting").innerText = greeting;
            document.getElementById("date").innerText = now.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' });
        }
        setInterval(updateClock, 1000); updateClock();

        let chronoInterval, seconds = 0;
        function startChrono() { clearInterval(chronoInterval); chronoInterval = setInterval(() => { seconds++; updateChronoDisplay(); }, 1000); }
        function stopChrono() { clearInterval(chronoInterval); }
        function resetChrono() { stopChrono(); seconds = 0; updateChronoDisplay(); }
        function updateChronoDisplay() {
            let h = Math.floor(seconds / 3600), m = Math.floor((seconds % 3600) / 60), s = seconds % 60;
            document.getElementById("chronoDisplay").innerText = (h<10?"0"+h:h)+":"+(m<10?"0"+m:m)+":"+(s<10?"0"+s:s);
        }

        let timerInterval;
        function startTimer() {
            let mins = document.getElementById("timerInput").value;
            if (!mins || mins <= 0) return;
            let time = mins * 60;
            document.getElementById("timerStartBtn").style.display = "none";
            document.getElementById("timerStopBtn").style.display = "flex";
            timerInterval = setInterval(() => {
                time--;
                let tm = Math.floor(time / 60), ts = time % 60;
                document.getElementById("timerDisplay").innerText = (tm<10?"0"+tm:tm)+":"+(ts<10?"0"+ts:ts);
                if (time <= 0) { clearInterval(timerInterval); document.body.classList.add("emergency-mode"); }
            }, 1000);
        }
        function stopEmergency() {
            clearInterval(timerInterval); document.body.classList.remove("emergency-mode");
            document.getElementById("timerDisplay").innerText = "00:00";
            document.getElementById("timerStartBtn").style.display = "flex";
            document.getElementById("timerStopBtn").style.display = "none";
        }
    </script>
</body>
</html>
