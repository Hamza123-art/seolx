<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEOLX | Giriş</title>
    <style>
        /* Temel Sıfırlama */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Ana Konteynır */
        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: background-color 3s ease-in-out; /* Kararma hızı */
        }

        /* 1. Aşama: SEOLX Yazısı ve Buton */
        #start-content {
            text-align: center;
            color: white;
        }

        #start-content h1 {
            font-size: 4rem;
            letter-spacing: 10px;
            margin-bottom: 20px;
        }

        #enter-btn {
            padding: 12px 30px;
            background: transparent;
            color: white;
            border: 2px solid white;
            cursor: pointer;
            font-size: 1.1rem;
            text-transform: uppercase;
            transition: 0.3s;
        }

        #enter-btn:hover {
            background: white;
            color: black;
        }

        /* 2. Aşama: Video */
        #intro-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        /* 3. Aşama: Final Yazısı */
        #final-message {
            color: white;
            font-size: 2.5rem;
            opacity: 0;
            text-align: center;
            transition: opacity 2s ease;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div id="start-content">
            <h1>SEOLX</h1>
            <button id="enter-btn">İçeri Gir</button>
        </div>

        <video id="intro-video" playsinline>
            <source src="second.mp4" type="video/mp4">
        </video>

        <div id="final-message">Burda Olman Tesadüf değil</div>
    </div>

    <audio id="bg-music" src="music.mp3"></audio>

    <script>
        const overlay = document.getElementById('intro-overlay');
        const enterBtn = document.getElementById('enter-btn');
        const startContent = document.getElementById('start-content');
        const video = document.getElementById('intro-video');
        const finalMessage = document.getElementById('final-message');
        const music = document.getElementById('bg-music');

        enterBtn.addEventListener('click', () => {
            // 1. Yazıları gizle ve videoyu oynat
            startContent.style.display = 'none';
            video.style.display = 'block';
            video.play().catch(error => console.log("Video oynatılamadı:", error));
        });

        // Video bitince tetiklenecek olay
        video.onended = () => {
            video.style.display = 'none';
            
            // Ekranı bembeyaz yap
            overlay.style.backgroundColor = 'white';
            
            // Müziği başlat
            music.play().catch(error => console.log("Müzik oynatılamadı:", error));

            // Kısa bir süre beyaz kalsın, sonra kararmaya başlasın
            setTimeout(() => {
                overlay.style.backgroundColor = 'black';
                
                // Kararma bitince (3 saniye sonra) mesajı göster
                setTimeout(() => {
                    finalMessage.style.opacity = '1';
                }, 3000);

            }, 800); // 0.8 saniye beyaz kalır
        };
    </script>
</body>
</html>
